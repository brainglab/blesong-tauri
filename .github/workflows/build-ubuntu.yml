name: Build Ubuntu

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blesong-angular/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Tauri CLI
        run: |
          if ! command -v cargo-tauri >/dev/null 2>&1; then
            cargo install tauri-cli --version "^2.0" --locked
          fi

      - name: Install Angular dependencies
        run: npm ci
        working-directory: blesong-angular

      - name: Build Angular (production)
        run: npm run prod
        working-directory: blesong-angular

      - name: Build Tauri for Ubuntu
        run: cargo tauri build
        working-directory: src-tauri

      - name: Verify binary was produced
        run: |
          set -euo pipefail
          BIN=src-tauri/target/release/blesong
          if [ ! -f "$BIN" ]; then
            echo "ERROR: Tauri binary not found at $BIN"
            echo "Listing target/release:"
            ls -la src-tauri/target/release || true
            exit 1
          fi
          file "$BIN"
          ls -la "$BIN"

      - name: Resolve release version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)
            VERSION="${VERSION}+$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Create portable package
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PKG="blesong-${VERSION}-linux-amd64"
          mkdir -p "$PKG"
          cp src-tauri/target/release/blesong "$PKG/"
          chmod +x "$PKG/blesong"
          cp -r src-tauri/resources "$PKG/"
          mkdir -p "$PKG/www"
          cp -r blesong-angular/dist/blesong/browser/* "$PKG/www/"
          tar -czf "${PKG}.tar.gz" "$PKG/"
          echo "PORTABLE_TARBALL=${PKG}.tar.gz" >> "$GITHUB_ENV"
          ls -lh "${PKG}.tar.gz"

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp "$PORTABLE_TARBALL" release-assets/
          find src-tauri/target/release/bundle/deb -name '*.deb' -exec cp {} release-assets/ \; 2>/dev/null || true
          find src-tauri/target/release/bundle/appimage -name '*.AppImage' -exec cp {} release-assets/ \; 2>/dev/null || true
          find src-tauri/target/release/bundle/rpm -name '*.rpm' -exec cp {} release-assets/ \; 2>/dev/null || true
          ls -lh release-assets/

      - name: Upload portable package (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: blesong-portable-linux
          path: ${{ env.PORTABLE_TARBALL }}
          if-no-files-found: error

      - name: Upload Linux bundles (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: blesong-linux-bundles
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Blesong ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
