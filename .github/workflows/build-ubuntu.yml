name: Build Ubuntu

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Angular dependencies
        run: cd blesong-angular && npm ci

      - name: Build Tauri for Ubuntu
        run: cargo tauri build
        working-directory: src-tauri

      - name: Create portable package
        run: |
          mkdir -p blesong-portable
          cp src-tauri/target/release/blesong blesong-portable/
          cp -r src-tauri/resources blesong-portable/
          if [ -d "blesong-angular/dist/blesong/browser" ]; then
            mkdir -p blesong-portable/www
            cp -r blesong-angular/dist/blesong/browser/* blesong-portable/www/
          fi
          tar -czf blesong-portable-linux-amd64.tar.gz blesong-portable/

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: blesong-portable-linux
          path: blesong-portable-linux-amd64.tar.gz
