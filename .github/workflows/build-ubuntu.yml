name: Build Ubuntu

# Se ejecuta cuando:
# 1. Creas un tag como v1.0.0 (git tag v1.0.0 && git push --tags)
# 2. Manualmente desde GitHub (boton "Run workflow")
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Angular dependencies
        run: cd blesong-angular && npm ci

      - name: Build Tauri for Ubuntu
        run: cd src-tauri && cargo tauri build

      - name: Upload .deb package
        uses: actions/upload-artifact@v4
        with:
          name: blesong-ubuntu-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: blesong-ubuntu-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
