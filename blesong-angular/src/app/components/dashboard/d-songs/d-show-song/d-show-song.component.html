<div id="db-wrapper">

  <app-d-sidebar mController="songs"></app-d-sidebar>

  <div id="page-content">
    <div class="header">

      <app-d-navbar></app-d-navbar>

    </div>
    <div class="container-fluid bg-gray-100 p-4 animate__animated animate__fadeIn animate__faster">

      <!-- title -->
      <div class="row ">
        <div class="col-lg-12 col-md-12 col-12">
          <!-- Page header -->
          <div class="border-bottom pb-3 mb-3 d-lg-flex justify-content-between align-items-center">
            <div class="mb-2 mb-lg-0">
              <h1 class="mb-0 h2 fw-bold">Cancion</h1>
            </div>
          </div>

        </div>
      </div>

      <div class="row justify-content-center">

        <!-- image upload -->
        <!-- <div class="col-md-3">
          <div class="card shadow">
            <div class="card-header">
              <h3 class="card-title">Imágen</h3>
            </div>
            <div class="card-body text-center">
              <span class="avatar avatar-xxl ">
                <img class="rounded-circle border border-4 border-light shadow" src="{{ mImageUrl }}" onerror="if (this.src != 'error.jpg') this.src='assets/images/image_not_found.jpg';" width="300" height="300" alt="">
              </span>
            </div>
          </div>
        </div> -->

        <div class="col-md-6">

          <div class="card card-small shadow mb-4">
            <div class="card-header">
              <h3 class="card-title">Datos generales</h3>
            </div>
            <div class="table-responsive">
              <table class="table table-hover bg-white mb-0">
                <tbody>

                  <tr class="text-left">
                    <th class="px-4 fw-bolder">Nombre</th>
                    <td class="px-4 text-break">{{ mSong.song_name }}</td>
                  </tr>
                  <tr class="text-left">
                    <th class="px-4 fw-bolder">Autor</th>
                    <td class="px-4 text-break">{{ mAutor.autor_name }}</td>
                  </tr>
                  <tr class="text-left">
                    <th class="px-4 fw-bolder">Año</th>
                    <td class="px-4 text-break">{{ mSong.song_year }}</td>
                  </tr>
                  <tr class="text-left">
                    <th class="px-4 fw-bolder">Contenido</th>
                    <td class="px-4 text-break">
                      <div [innerHtml]="mSong.song_content | encapsulationHtml"></div>
                    </td>
                  </tr>


                  <tr class="text-left">
                    <th class="px-4 fw-bolder">Creación</th>
                    <td class="px-4 text-break">{{ mSong.createdAt | date:'dd/MM/yyyy HH:mm:ss':'+0000'}}</td>
                  </tr>
                  <tr class="text-left">
                    <th class="px-4 fw-bolder">Actualización</th>
                    <td class="px-4 text-break">{{ mSong.updatedAt | date:'dd/MM/yyyy HH:mm:ss':'+0000' }}</td>
                  </tr>


                </tbody>
              </table>
            </div>
            <div class="card-footer">
              <div class="d-flex justify-content-end">
                <button class="btn btn-secondary rounded-pill m-1" type="button" backButton>Volver</button>
                <button class="btn btn-primary rounded-pill m-1" type="button" [routerLink]="['/songs/edit', mSong.idx]">Editar</button>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>
