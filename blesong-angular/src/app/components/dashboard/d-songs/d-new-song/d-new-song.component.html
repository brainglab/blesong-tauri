<div id="db-wrapper">

  <app-d-sidebar mController="songs"></app-d-sidebar>

  <div id="page-content">
    <div class="header">

      <app-d-navbar></app-d-navbar>

    </div>
    <div class="container-fluid bg-gray-100 p-4 animate__animated animate__fadeIn animate__faster">

      <!-- title -->
      <div class="row ">
        <div class="col-lg-12 col-md-12 col-12">
          <!-- Page header -->
          <div class="border-bottom pb-3 mb-3 d-lg-flex justify-content-between align-items-center">
            <div class="mb-2 mb-lg-0">
              <h1 class="mb-0 h2 fw-bold">Nuevo Cancion</h1>
            </div>
          </div>

        </div>
      </div>

      <div class="row justify-content-center">

        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-body">

              <!-- form -->
              <app-d-form-song (mSongResponse)="save($event)" [mSong]="mSong"></app-d-form-song>

            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
