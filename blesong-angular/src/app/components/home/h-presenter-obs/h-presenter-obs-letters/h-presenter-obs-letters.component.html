<app-h-presenter-obs-navbar (mResponse)="sendStandBy()"></app-h-presenter-obs-navbar>

<div class="row m-2">
  <div class="col-12 mb-2">
    <h3>Letras</h3>
    <hr>
    <form autocomplete="off" [formGroup]="mForm" #f="ngForm">

      <div class="mb-3">
        <label class="form-label" for="song_idx">Canción <span class="text-danger" *ngIf="this.mForm.controls['song_idx'].hasValidator(mValidators.required)">*</span></label>
        <div class="input-group">
          <input class="form-control" autocomplete="off" id="song_idx" type="text" #song_idx formControlName="song_idx" [class.is-invalid]="mSongIdxValid" placeholder="Canción..." readonly (click)="showModalOption('Seleccione Canción', mOptionsSongIdx, 'song_idx' )">
          <button class="btn btn-sm btn-light" type="button" (click)="showModalOption('Seleccione Canción', mOptionsSongIdx, 'song_idx' , true)"><i class="fa-solid fa-circle-xmark"></i></button>
          <button class="btn btn-sm btn-primary" type="button" (click)="showModalOption('Seleccione Canción', mOptionsSongIdx, 'song_idx' )"><i class="fa-solid fa-circle-chevron-down"></i></button>
        </div>
        <small *ngIf="mSongIdxValid" class="text-danger">
          <div *ngIf="this.mForm.get('song_idx').errors.required">No puede estar vacío</div>
          <div *ngIf="this.mForm.get('song_idx').errors.minlength">Debe tener al menos 1 caractéres</div>
          <div *ngIf="this.mForm.get('song_idx').errors.maxlength">Debe tener como máximo 255 caractéres</div>
          <div *ngIf="this.mForm.get('song_idx').errors.pattern">Campo no válido</div>
        </small>
      </div>

    </form>
  </div>

  <div class="col-12 mb-2" *ngIf="mSongArray.length > 0" role="button">
    <div class="card card-custom bg-gray-100 mb-2" [ngClass]="mSongIndex == i ? 'border border-primary border-5' : ''" *ngFor="let mSong of mSongArray; index as i" (click)="setSongPart(i)">
      <div class="card-body text-center" style="color: #ffffff;">
        {{ mSong }}
      </div>
    </div>
  </div>

  <div class="col-12" *ngIf="mSongArray.length <= 0">
    <div class="row justify-content-center">
      <div class="card animate__animated animate__fadeIn">
        <div class="card-body text-center py-5 w-100">
          <i class="fa-solid fa-hourglass-half fa-3x text-muted mb-3"></i>
          <h4 class="text-muted">No haz seleccionado una canción.</h4>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="text-center m-4">
  <p class="text-muted mb-0">© <span class="text-dark fw-bold">Blesong</span> - Todos los derechos reservados a <a href="https://brainglab.com" target="_blank" class="text-secondary">Brainglab</a>, consultora en servicios informáticos.</p>
</div>
