<!-- Contenedor principal para el menú -->
<nav class="navbar fixed-top bg-body-tertiary bg-light">
  <div class="container-fluid d-flex justify-content-between">
    <!-- Logo alineado a la izquierda -->
    <div class="d-flex align-items-center p-3">
      <a routerLink="/presenter/qr-menu">
        <img src="assets/images/logo.png" alt="Logo principal" height="30">
      </a>
    </div>
  </div>
</nav>

<!-- Mensaje de espera cuando no hay canciones -->
<div class="container mt-4" *ngIf="!mRealtime.song_array?.length" style="padding-top: 100px;">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-6">
      <div class="card animate__animated animate__fadeIn">
        <div class="card-body text-center py-5">
          <i class="fa-solid fa-hourglass-half fa-3x text-muted mb-3"></i>
          <h4 class="text-muted">En espera de iniciar una canción</h4>
        </div>
      </div>
    </div>
  </div>
</div>


<!-- Contenedor principal para las tarjetas -->
<div class="container-fluid mt-4" style="padding-top: 100px;">
  <div class="row justify-content-center" *ngFor="let mSong of mRealtime.song_array; let mIndex = index">
    <!-- Iteramos sobre el arreglo de canciones -->
    <div class="col-12 col-lg-8 col-xl-6 mb-3">
      <!-- Tarjeta individual -->
      <div class="card card-custom animate__animated w-100"
           [ngClass]="{
             'border-primary border-3 animate__pulse': mIndex === mRealtime.song_slide_selected,
             'animate__fadeIn': mIndex !== mRealtime.song_slide_selected
           }">
        <div class="card-body text-center">
          <div class="fs-4"
               [ngClass]="{
                 'text-dark animate__animated animate__fadeIn': mIndex === mRealtime.song_slide_selected,
                 'text-muted': mIndex !== mRealtime.song_slide_selected
               }"
               [innerHTML]="mSong"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="text-center m-4">
  <p class="text-muted mb-0">© <span class="text-dark fw-bold">Blesong</span> - Todos los derechos reservados a <a href="https://brainglab.com" target="_blank" class="text-secondary">Brainglab</a>, consultora en servicios informáticos.</p>
</div>
